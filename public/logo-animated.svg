<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .outline {
      fill: none;
      stroke: currentColor;
      stroke-width: 4;
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: draw 2s ease forwards;
    }
    .fill {
      fill: currentColor;
      opacity: 0;
      animation: fadeIn 0.5s ease 2s forwards;
    }
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      .outline { animation: none; stroke-dashoffset: 0; }
      .fill { animation: none; opacity: 1; }
    }
  </style>
  <circle class="outline" cx="50" cy="50" r="48" />
  <path class="outline" d="M50 20 L65 80 L50 65 L35 80 Z" />
  <path class="fill" d="M50 20 L65 80 L50 65 L35 80 Z" />
</svg>
